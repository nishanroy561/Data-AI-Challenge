# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Kaggle Notebook (CPU session)"     # ranking reproduced here; precompute used a Kaggle GPU session
  cpu_cores: 4                                   # Kaggle CPU notebook
  ram_gb: 16                                     # within the 16 GB budget (observed peak < 4 GB)
  python_version: "3.12.13"                      # Kaggle runtime
  os: "Ubuntu 22.04 LTS"                         # Kaggle runtime
  uses_gpu_for_inference: false                  # ranking is pure CPU numpy; no model loaded
  has_network_during_ranking: false             # rank.py loads only local files; no API calls
  pre_computation_required: true                 # candidate + JD embeddings generated offline
  pre_computation_time_minutes: 15               # ~14m to embed 100K profiles on a Kaggle T4 GPU

# ============================================================================
# AI tools declaration  (transparency only — not penalized; be honest)
# ============================================================================
ai_tools_used:
  - "Claude"        # Claude Code: architecture, feature design, code, debugging, doc drafting

ai_usage_summary: |
  Used Claude (Claude Code) throughout development: discussing the ranking
  architecture, drafting and refactoring the Python modules (features, scoring,
  reasoning, precompute), debugging the Kaggle pipeline, and writing the docs
  (PRD, solution flow, README). All design decisions, weight choices, data
  exploration, and trap analysis were directed and reviewed by the author. The
  ranking code calls NO LLM and sends NO candidate data to any hosted model —
  the only model used is a local sentence-transformer (BAAI/bge-small-en-v1.5)
  for offline embedding precomputation.

# ============================================================================
# Approach summary (≤200 words)
# ============================================================================
methodology_summary: |
  Hybrid rule + semantic ranker designed explicitly against the dataset's traps.
  The decisive signal is title + career-trajectory fit, NOT the skills list:
  keyword-stuffers (e.g. a Graphic Designer listing RAG/Pinecone/FAISS) are
  caught because their career history describes unrelated work, while plain-
  language "Tier-5" fits (Search Engineers, Software Engineer (ML) who actually
  built ranking/recsys) are surfaced by reading work evidence in career
  DESCRIPTIONS, which lifts adjacent titles toward core.

  Final score = base_fit x behavioral_multiplier x honeypot_gate.
  base_fit = 0.35*title/career + 0.30*semantic + 0.20*experience
           + 0.15*trust-discounted skills - disqualifier penalties
  (services-only career, job-hopping, CV/speech-only, research-only).
  Semantic = cosine of a bge-small embedding of the candidate narrative vs a JD
  anchor. Behavioral signals (recency, recruiter response, open-to-work, notice)
  multiply the score so unavailable candidates are down-weighted. An internal-
  consistency check (tenure vs experience, expert-with-zero-months) gates out
  honeypots. Embeddings are precomputed offline on GPU; the ranking step is pure
  CPU numpy, ~42s for 100K, fully offline. Reasoning is built from real profile
  facts (named skills, employer, signal values) — no LLM in the ranking path.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true          # explicit internal-consistency gate; 0 honeypots in top 100
  reproduction_tested: true          # validated on Kaggle CPU session; validator passes
